<!doctype html>
<html lang="es">
  <head><title>Acceso sintético</title></head>
  <body>
    <main>
      <h1>Bienvenido</h1>
      <form action="/synthetic-login" method="post">
        <div class="legacy-login-layout">
          <label>Usuario <input name="user" autocomplete="username" /></label>
          <label>Clave <input type="password" name="password" autocomplete="current-password" /></label>
          <input type="submit" value="Entrar al sistema" />
          <button type="button">Ayuda</button>
          <button type="button">Cambio de clave</button>
        </div>
      </form>
    </main>
  </body>
</html>
